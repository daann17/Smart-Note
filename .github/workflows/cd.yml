name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script_stop: true
          script: |
            set -euxo pipefail

            export JAVA_HOME=/usr/lib/jvm/java-17-openjdk
            export PATH="$JAVA_HOME/bin:$PATH"

            echo "==> Updating repository"
            cd /www/wwwroot/Smart-Note
            git fetch --all --prune
            git checkout main
            git pull --ff-only

            echo "==> Building backend"
            cd /www/wwwroot/Smart-Note/backend
            mvn -B -DskipTests clean package
            systemctl restart smartnote
            systemctl is-active --quiet smartnote

            echo "==> Checking backend health"
            # Wait for the application to bind its port and accept HTTP traffic.
            for i in $(seq 1 30); do
              if ss -lnt | grep -q ':8081 '; then
                http_code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8081/ || true)
                if [ "$http_code" != "000" ] && [ "${http_code#5}" = "$http_code" ]; then
                  break
                fi
              fi
              sleep 2
            done

            http_code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8081/ || true)
            if [ "$http_code" = "000" ] || [ "${http_code#5}" != "$http_code" ]; then
              echo "Backend health check failed, status: $http_code"
              exit 1
            fi

            echo "==> Building frontend"
            cd /www/wwwroot/Smart-Note/frontend
            if command -v corepack >/dev/null 2>&1; then
              corepack enable
              corepack prepare pnpm@10.17.0 --activate
            fi
            if ! command -v pnpm >/dev/null 2>&1; then
              npm install -g pnpm
            fi
            pnpm install --frozen-lockfile
            pnpm build

            echo "==> Publishing frontend assets"
            mkdir -p /www/wwwroot/smartnote-web
            rm -rf /www/wwwroot/smartnote-web/*
            cp -a dist/. /www/wwwroot/smartnote-web/
